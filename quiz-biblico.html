<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Bíblico - 50 Acertos Seguidos</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 25px; }
        
        .progress-text { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        
        .progress-bar { width: 100%; height: 12px; background-color: var(--border); border-radius: 6px; overflow: hidden; }
        
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--success)); transition: width 0.3s; }

        .question { font-size: 18px; font-weight: bold; margin: 25px 0; line-height: 1.5; min-height: 54px; }

        .options-list { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            background: transparent; color: var(--text-color); border: 2px solid var(--border);
            padding: 15px; border-radius: 10px; cursor: pointer; font-size: 16px; text-align: left; transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .option-btn.correct { background-color: rgba(16, 185, 129, 0.15) !important; border-color: var(--success) !important; color: #34d399; }
        
        .option-btn.wrong { background-color: rgba(239, 68, 68, 0.15) !important; border-color: var(--danger) !important; color: #f87171; }

        .screen { display: none; }
        .screen.active { display: block; }

        .btn-action {
            background: var(--primary); color: white; border: none; padding: 14px 28px;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px;
        }
        .btn-action:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

    <div class="container">
        <!-- ECRÃ DO JOGO -->
        <div id="game-screen" class="screen active">
            <h1>Desafio Bíblico das 50 Perguntas</h1>
            <p class="subtitle">Errou uma pergunta? Volta ao início!</p>
            
            <div class="progress-text">
                <span id="streak-label">Sequência Atual: 0</span>
                <span>Objetivo: 50</span>
            </div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>

            <div class="question" id="question-text">A carregar...</div>
            <div class="options-list">
                <button class="option-btn" onclick="checkAnswer(0)"></button>
                <button class="option-btn" onclick="checkAnswer(1)"></button>
                <button class="option-btn" onclick="checkAnswer(2)"></button>
            </div>
        </div>

        <!-- ECRÃ DE FIM DE JOGO (GAME OVER) -->
        <div id="gameover-screen" class="screen">
            <h1 style="color: var(--danger)">💀 Fim de Jogo!</h1>
            <p id="gameover-msg" style="margin-top: 15px; font-size: 18px;"></p>
            <button class="btn-action" onclick="restartGame()">Tentar Novamente</button>
        </div>

        <!-- ECRÃ DE VITÓRIA -->
        <div id="victory-screen" class="screen">
            <h1 style="color: var(--success)">👑 Excelente Progresso!</h1>
            <p style="margin-top: 15px;">Muitos parabéns! Conseguiu alcançar os 50 acertos bíblicos seguidos!</p>
            <button class="btn-action" onclick="restartGame()">Jogar Novamente</button>
        </div>
    </div>

        ];

        let perguntasDoJogo = [];
        let indiceAtual = 0;
        let aceitandoRespostas = true;

        const gameScreen = document.getElementById('game-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const victoryScreen = document.getElementById('victory-screen');
        const questionText = document.getElementById('question-text');
        const optionButtons = document.querySelectorAll('.option-btn');
        const streakLabel = document.getElementById('streak-label');
        const progressFill = document.getElementById('progress-fill');
        const gameoverMsg = document.getElementById('gameover-msg');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initRound() {
            if (typeof poolDePerguntas === 'undefined' || poolDePerguntas.length === 0) {
                questionText.innerText = "Erro ao carregar as perguntas do jogo.";
                return;
            }
            const emba = shuffle([...poolDePerguntas]);
            perguntasDoJogo = emba.slice(0, 50);
            indiceAtual = 0;
            aceitandoRespostas = true;
            updateUI();
        }

        function updateUI() {
            streakLabel.innerText = `Sequência Atual: ${indiceAtual}`;
            progressFill.style.width = `${(indiceAtual / 50) * 100}%`;
            optionButtons.forEach(btn => { btn.className = 'option-btn'; btn.disabled = false; });

            const p = perguntasDoJogo[indiceAtual];
            questionText.innerText = p.q;
            optionButtons[0].innerText = p.o[0];
            optionButtons[1].innerText = p.o[1];
            optionButtons[2].innerText = p.o[2];
        }

        function checkAnswer(chosenIndex) {
            if (!aceitandoRespostas) return;
            aceitandoRespostas = false;
            const p = perguntasDoJogo[indiceAtual];
            optionButtons.forEach(btn => btn.disabled = true);

            if (chosenIndex === p.c) {
                optionButtons[chosenIndex].classList.add('correct');
                setTimeout(() => {
                    indiceAtual++;
                    if (indiceAtual >= 50) { showScreen(victoryScreen); } 
                    else { aceitandoRespostas = true; updateUI(); }
                }, 600);
            } else {
                optionButtons[chosenIndex].classList.add('wrong');
                optionButtons[p.c].classList.add('correct');
                setTimeout(() => {
                    gameoverMsg.innerHTML = `Errou na pergunta número <strong>${indiceAtual + 1}</strong>!`;
                    showScreen(gameoverScreen);
                }, 1000);
            }
        }

        function showScreen(screen) {
            gameScreen.classList.remove('active');
            gameoverScreen.classList.remove('active');
            victoryScreen.classList.remove('active');
            screen.classList.add('active');
        }

        function restartGame() { showScreen(gameScreen); initRound(); }

        window.onload = initRound;
    </script>
</body>
</html>
