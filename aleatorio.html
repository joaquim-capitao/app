<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Numérico</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
            /* Melhora o teclado numérico no mobile */
            inputmode: numeric;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            /* Remove o delay de toque em alguns browsers mobile */
            touch-action: manipulation; 
        }

        button:active {
            background-color: #0056b3;
            transform: scale(0.98);
        }

        .result-container {
            margin-top: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-title {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        #result {
            font-size: 3.5rem;
            font-weight: 800;
            color: #28a745;
            transition: transform 0.3s ease;
        }

        .animate {
            animation: pop 0.3s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(0.6); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎲 Sorteador</h1>
        
        <div class="input-group">
            <div class="field">
                <label for="min">Mínimo</label>
                <input type="number" id="min" value="1">
            </div>
            <div class="field">
                <label for="max">Máximo</label>
                <input type="number" id="max" value="20">
            </div>
        </div>

        <button onclick="sortear()">Sortear Número</button>

        <div class="result-container">
            <div class="result-title">Resultado</div>
            <div id="result">-</div>
        </div>
    </div>

    <script>
        function sortear() {
            const min = Math.ceil(document.getElementById('min').value);
            const max = Math.floor(document.getElementById('max').value);
            const resultElement = document.getElementById('result');

            // Validação simples
            if (isNaN(min) || isNaN(max)) {
                alert("Por favor, insira números válidos.");
                return;
            }

            if (min > max) {
                alert("O valor mínimo não pode ser maior que o máximo!");
                return;
            }

            // Lógica do sorteio (incluindo o máximo e o mínimo)
            const resultado = Math.floor(Math.random() * (max - min + 1)) + min;

            // Efeito visual no número sorteado
            resultElement.innerText = resultado;
            resultElement.classList.remove('animate');
            void resultElement.offsetWidth; // Truque para resetar a animação CSS
            resultElement.classList.add('animate');
        }
    </script>

</body>
</html>
